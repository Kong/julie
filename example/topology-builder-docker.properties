# Julie-Ops Configuration for Docker Compose Setup

# Kafka Bootstrap Servers (use internal docker network name)
bootstrap.servers=kafka:29092

# Disable state cluster for simple testing
topology.state.cluster.enabled=false

# File-based state management
topology.state.from.cluster=false

# Platform servers (optional - uncomment if needed)
# platform.server.ksql.url=http://ksqldb:8088
# platform.server.schema.registry.url=http://schema-registry:8081
# platform.server.connect.url=http://kafka-connect:8083

# Access control (disabled for testing)
allow.delete.topics=true
allow.delete.bindings=true

# Quiet mode (set to false for more verbose output)
quiet=false

# Optional: Enable Confluent Cloud support
# ccloud.enabled=false
